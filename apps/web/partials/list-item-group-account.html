<!--
  list-item / group-account — designs/components/list-item/list-item/variants/group-account
  Placeholders: {{ICON}}, {{TITLE}}, {{SUBTITLE}}, {{CURRENCY}}, {{VALUE}}, {{ARIA_LABEL}}, {{EXTRA_CLASS}}
-->
<article class="list-item list-item--group-account{{EXTRA_CLASS}}" aria-label="{{ARIA_LABEL}}">
  <div class="list-item__media">
    <svg class="list-item__icon" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true" focusable="false">{{ICON}}</svg>
  </div>
  <div class="list-item__body type-stack-tight">
    <span class="list-item__title type-sm type-trim">{{TITLE}}</span>
    <span class="list-item__subtitle type-xs type-trim">{{SUBTITLE}}</span>
  </div>
  <div class="list-item__end">
    <span class="list-item__currency type-xs">{{CURRENCY}}</span>
    <span class="list-item__value type-sm type-bold">{{VALUE}}</span>
  </div>
</article>
