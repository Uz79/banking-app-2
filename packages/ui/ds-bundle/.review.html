<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>@banking-app/ui — component review</title>
<style>
  :root { color-scheme: light; }
  body { margin: 0; font: 14px/1.5 system-ui, sans-serif; background: #f4f5f7; color: #111; display: flex; min-height: 100vh; }
  nav { width: 220px; flex: 0 0 auto; background: #fff; border-right: 1px solid #e5e7eb; padding: 16px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; box-sizing: border-box; }
  nav h1 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: #6b7280; margin: 0 16px 12px; }
  nav a { display: block; padding: 7px 16px; color: #111; text-decoration: none; border-left: 3px solid transparent; }
  nav a:hover { background: #f3f4f6; }
  nav a.active { border-left-color: #2563eb; background: #eff6ff; font-weight: 600; }
  main { flex: 1; display: flex; flex-direction: column; }
  header { padding: 12px 20px; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 12px; }
  header strong { font-size: 16px; }
  header a { color: #2563eb; font-size: 13px; }
  iframe { flex: 1; border: 0; width: 100%; background: #fff; }
</style>
</head>
<body>
<nav id="nav"><h1>Components</h1></nav>
<main>
  <header><strong id="title"></strong><a id="openRaw" href="#" target="_blank">open standalone ↗</a></header>
  <iframe id="frame" title="component preview"></iframe>
</main>
<script>
const components = ["ActionBar","Button","Card","CardAmount","Carousel","Chip","Dialog","Expander","GroupAccountListItem","IconButton","ListItem","NavBar","SegmentedControl","SelectField","TabControl","TextField"];
const nav = document.getElementById('nav');
const frame = document.getElementById('frame');
const title = document.getElementById('title');
const openRaw = document.getElementById('openRaw');
function urlFor(name) { return 'components/general/' + name + '/' + name + '.html'; }
function select(name) {
  frame.src = urlFor(name);
  title.textContent = name;
  openRaw.href = urlFor(name);
  location.hash = name;
  for (const a of nav.querySelectorAll('a')) a.classList.toggle('active', a.textContent === name);
}
for (const name of components) {
  const a = document.createElement('a');
  a.textContent = name;
  a.href = '#' + name;
  a.addEventListener('click', (e) => { e.preventDefault(); select(name); });
  nav.appendChild(a);
}
function fromHash() { select(components.includes(location.hash.slice(1)) ? location.hash.slice(1) : 'Button'); }
window.addEventListener('hashchange', fromHash);
fromHash();
</script>
</body>
</html>
